<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Flow Map</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0d0f18;
      --surface:  #13161f;
      --surface2: #1a1d2e;
      --border:   #252840;
      --text:     #e2e4f0;
      --muted:    #5a607a;
      --accent:   #6c63ff;

      --c-orchestrator: #f59e0b;
      --c-analyst:      #3b82f6;
      --c-reviewer:     #10b981;
      --c-etf:          #06b6d4;
      --c-reporter:     #a78bfa;
      --c-builder:      #f97316;
      --c-other:        #4b5563;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    /* ── Layout ── */
    .app    { display: flex; flex-direction: column; height: 100vh; }
    .header {
      height: 48px; display: flex; align-items: center; gap: 16px;
      padding: 0 20px; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      position: relative; z-index: 10;
    }
    .logo        { font-size: 16px; font-weight: 700; }
    .logo span   { color: var(--accent); }
    .nav-link    {
      font-size: 12px; color: var(--muted); text-decoration: none;
      padding: 4px 10px; border-radius: 6px; transition: all 0.15s;
    }
    .nav-link:hover, .nav-link.active {
      color: var(--text); background: var(--border);
    }
    .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

    .body { flex: 1; display: flex; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px; background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
    }
    .sidebar-section {
      padding: 12px; border-bottom: 1px solid var(--border);
    }
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    .tab-row   { display: flex; gap: 3px; }
    .tab-btn   {
      flex: 1; padding: 5px 0; border-radius: 6px; font-size: 11px; font-weight: 600;
      border: none; cursor: pointer; background: transparent; color: var(--muted);
      transition: all 0.15s;
    }
    .tab-btn:hover  { background: var(--border); color: var(--text); }
    .tab-btn.active { background: var(--accent); color: #fff; }

    .pipeline-list { overflow-y: auto; flex: 1; padding: 8px; }
    .p-item {
      padding: 9px 10px; border-radius: 7px; cursor: pointer; margin-bottom: 4px;
      border: 1px solid transparent; transition: all 0.15s;
    }
    .p-item:hover  { background: var(--border); }
    .p-item.active { border-color: var(--accent); background: rgba(108,99,255,0.1); }
    .p-item-top    { display: flex; align-items: center; gap: 7px; }
    .p-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .p-name { font-size: 12px; font-weight: 600; }
    .p-meta { font-size: 10px; color: var(--muted); margin-top: 3px; padding-left: 15px; line-height: 1.4; }

    .legend { padding: 10px 12px; border-top: 1px solid var(--border); }
    .l-row  { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; font-size: 10px; color: var(--muted); }
    .l-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── Canvas ── */
    .canvas  { flex: 1; position: relative; overflow: hidden; }
    #svg     { width: 100%; height: 100%; }

    /* ── Controls ── */
    .controls {
      position: absolute; bottom: 16px; right: 16px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .ctrl {
      width: 30px; height: 30px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text); font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .ctrl:hover { background: var(--border); }

    /* ── Tooltip ── */
    .tip {
      position: fixed; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; max-width: 270px;
      pointer-events: none; z-index: 200; opacity: 0; transition: opacity 0.12s;
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    }
    .tip.show { opacity: 1; }
    .tip-name  { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
    .tip-type  { font-size: 10px; margin-bottom: 6px; opacity: 0.75; }
    .tip-desc  { font-size: 11px; color: var(--muted); margin-bottom: 8px; line-height: 1.45; }
    .tip-contract { font-size: 10px; margin-top: 6px; }
    .tip-contract-label { color: var(--muted); margin-bottom: 2px; }
    .tip-contract-item { color: #a0a8c0; font-family: monospace; font-size: 9.5px; margin-left: 4px; }
    .tip-model { font-size: 10px; background: var(--border); display: inline-block; padding: 2px 6px; border-radius: 4px; margin-top: 4px; }
    .tip-hint  { font-size: 9px; color: var(--accent); margin-top: 6px; opacity: 0.8; }

    /* ── SVG node/edge styles ── */
    .node { cursor: pointer; }
    .node rect { transition: filter 0.12s; }
    .node:hover rect { filter: brightness(1.35); }
    .node text { pointer-events: none; font-family: 'SF Pro Display', -apple-system, sans-serif; }

    .edge { fill: none; stroke-width: 1.5; }
    .edge-label { font-family: sans-serif; font-size: 9px; fill: var(--muted); text-anchor: middle; pointer-events: none; }
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo">Agent <span>Viewer</span></div>
    <a class="nav-link" href="/">에이전트 목록</a>
    <a class="nav-link active" href="/graph">플로우 맵</a>
    <a class="nav-link" href="/sessions">요청 히스토리</a>
    <div class="header-right">
      <span id="statsLabel" style="font-size:11px;color:var(--muted)"></span>
    </div>
  </header>

  <div class="body">
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="section-label">뷰 모드</div>
        <div class="tab-row">
          <button class="tab-btn active" id="tabFlow" onclick="setView('flow')">파이프라인</button>
          <button class="tab-btn"        id="tabMap"  onclick="setView('map')">전체 맵</button>
        </div>
      </div>

      <div id="pipelineSection">
        <div class="sidebar-section" style="padding-bottom:6px">
          <div class="section-label">파이프라인 선택</div>
        </div>
        <div class="pipeline-list" id="pipelineList"></div>
      </div>

      <div class="legend">
        <div class="section-label" style="margin-bottom:7px">범례</div>
        <div class="l-row"><div class="l-dot" style="background:var(--c-orchestrator)"></div>오케스트레이터</div>
        <div class="l-row"><div class="l-dot" style="background:var(--c-analyst)"></div>분석 에이전트</div>
        <div class="l-row"><div class="l-dot" style="background:var(--c-etf)"></div>ETF 에이전트</div>
        <div class="l-row"><div class="l-dot" style="background:var(--c-reporter)"></div>리포터</div>
        <div class="l-row"><div class="l-dot" style="background:var(--c-reviewer)"></div>리뷰어</div>
        <div class="l-row"><div class="l-dot" style="background:var(--c-other)"></div>기타</div>
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
          <div class="l-row">
            <svg width="24" height="8"><line x1="0" y1="4" x2="24" y2="4" stroke="#404060" stroke-width="1.5" marker-end="url(#a)"/></svg>
            순차 실행
          </div>
          <div class="l-row">
            <svg width="24" height="8"><line x1="0" y1="4" x2="24" y2="4" stroke="#404060" stroke-width="1.5" stroke-dasharray="4 3"/></svg>
            병렬 실행
          </div>
        </div>
      </div>
    </aside>

    <div class="canvas">
      <svg id="svg"></svg>
      <div class="controls">
        <button class="ctrl" onclick="zoomIn()"    title="확대">+</button>
        <button class="ctrl" onclick="zoomOut()"   title="축소">−</button>
        <button class="ctrl" onclick="resetView()" title="초기화">⊙</button>
      </div>
    </div>
  </div>
</div>

<div class="tip" id="tip"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let G = null          // graph data
let view = 'flow'
let activePid = null
let svgEl, svgD3, zoomBeh, rootG

const TYPE_COLOR = {
  orchestrator: '#f59e0b',
  analyst:      '#3b82f6',
  reviewer:     '#10b981',
  etf:          '#06b6d4',
  reporter:     '#a78bfa',
  builder:      '#f97316',
  other:        '#4b5563',
}

const NW = 148, NH = 44   // node width / height

// ─── Bootstrap ───────────────────────────────────────────────────────────────
async function init() {
  const res = await fetch('/api/graph')
  G = await res.json()
  document.getElementById('statsLabel').textContent =
    `에이전트 ${G.nodes.length}개 · 파이프라인 ${G.pipelines.length}개`

  setupSvg()
  renderPipelineList()
  if (G.pipelines.length) {
    activePid = G.pipelines[0].id
    document.querySelector('.p-item')?.classList.add('active')
  }
  drawFlow(activePid)
}

// ─── SVG setup ───────────────────────────────────────────────────────────────
function setupSvg() {
  svgEl = document.getElementById('svg')
  svgD3 = d3.select(svgEl)
  svgD3.selectAll('*').remove()

  const defs = svgD3.append('defs')
  function mkArrow(id, color) {
    defs.append('marker').attr('id', id)
      .attr('viewBox', '0 -4 8 8').attr('refX', 8).attr('refY', 0)
      .attr('markerWidth', 5).attr('markerHeight', 5).attr('orient', 'auto')
      .append('path').attr('d', 'M0,-4L8,0L0,4Z').attr('fill', color)
  }
  mkArrow('arr',       '#363a52')
  mkArrow('arr-hi',    '#6c63ff')
  mkArrow('arr-green', '#10b981')

  // Glow filter
  const filt = defs.append('filter').attr('id', 'glow').attr('x', '-20%').attr('y', '-20%').attr('width', '140%').attr('height', '140%')
  filt.append('feGaussianBlur').attr('in', 'SourceGraphic').attr('stdDeviation', '3').attr('result', 'blur')
  const merge = filt.append('feMerge')
  merge.append('feMergeNode').attr('in', 'blur')
  merge.append('feMergeNode').attr('in', 'SourceGraphic')

  zoomBeh = d3.zoom().scaleExtent([0.15, 4]).on('zoom', e => rootG.attr('transform', e.transform))
  svgD3.call(zoomBeh)
  rootG = svgD3.append('g')
}

// ─── Pipeline sidebar ─────────────────────────────────────────────────────────
function renderPipelineList() {
  const el = document.getElementById('pipelineList')
  el.innerHTML = G.pipelines.map(p => {
    const agents = p.steps.flatMap(s => s.agents)
    const steps  = p.steps.length
    return `
      <div class="p-item" data-id="${p.id}" onclick="selectPipeline('${p.id}')">
        <div class="p-item-top">
          <div class="p-dot" style="background:${p.color}"></div>
          <div class="p-name">${esc(p.label)}</div>
        </div>
        <div class="p-meta">${steps}단계 · ${agents.length}개 에이전트<br>${esc(p.description||'')}</div>
      </div>`
  }).join('')
}

function selectPipeline(id) {
  activePid = id
  document.querySelectorAll('.p-item').forEach(el => el.classList.toggle('active', el.dataset.id === id))
  drawFlow(id)
}

// ─── View toggle ─────────────────────────────────────────────────────────────
function setView(v) {
  view = v
  document.getElementById('tabFlow').classList.toggle('active', v === 'flow')
  document.getElementById('tabMap').classList.toggle('active', v === 'map')
  document.getElementById('pipelineSection').style.display = v === 'flow' ? '' : 'none'
  setupSvg()
  if (v === 'flow') drawFlow(activePid)
  else              drawMap()
}

// ─── Flow view ────────────────────────────────────────────────────────────────
function drawFlow(pid) {
  if (!rootG) return
  rootG.selectAll('*').remove()
  if (!pid) return

  const pipeline = G.pipelines.find(p => p.id === pid)
  if (!pipeline) return

  const W = svgEl.clientWidth
  const H = svgEl.clientHeight
  const STEP_H = 100   // vertical gap between steps
  const PAD    = 16    // horizontal padding inside parallel group

  const steps = pipeline.steps

  // ── Compute positions ─────────────────────────────────────────────────────
  const totalH = steps.length * (NH + STEP_H) - STEP_H
  let startY = (H - totalH) / 2 - 20

  const pos = {}   // key: `${slug}_${si}` → {x, y, slug, si}

  steps.forEach((step, si) => {
    const count  = step.agents.length
    const totalW = count * NW + (count - 1) * 32
    const sx     = (W - totalW) / 2
    const y      = startY + si * (NH + STEP_H) + NH / 2

    step.agents.forEach((slug, ai) => {
      pos[`${slug}_${si}`] = { x: sx + ai * (NW + 32) + NW / 2, y, slug, si }
    })
  })

  const pColor = pipeline.color

  // ── Parallel brackets ─────────────────────────────────────────────────────
  steps.forEach((step, si) => {
    if (!step.parallel || step.agents.length < 2) return
    const xs   = step.agents.map(s => pos[`${s}_${si}`].x)
    const cy   = pos[`${step.agents[0]}_${si}`].y
    const minX = Math.min(...xs) - NW / 2 - PAD
    const maxX = Math.max(...xs) + NW / 2 + PAD
    const py   = cy - NH / 2 - PAD

    rootG.append('rect')
      .attr('x', minX).attr('y', py)
      .attr('width', maxX - minX).attr('height', NH + PAD * 2)
      .attr('rx', 12).attr('fill', 'none')
      .attr('stroke', pColor + '40').attr('stroke-width', 1.5)
      .attr('stroke-dasharray', '6 4')

    rootG.append('text')
      .attr('x', (minX + maxX) / 2).attr('y', py - 7)
      .attr('text-anchor', 'middle').attr('font-size', 9)
      .attr('fill', pColor + 'bb').attr('font-weight', 600)
      .text('PARALLEL')
  })

  // ── Edges ─────────────────────────────────────────────────────────────────
  steps.forEach((step, si) => {
    if (si === steps.length - 1) return
    const nxt = steps[si + 1]

    step.agents.forEach(src => {
      nxt.agents.forEach(tgt => {
        const s = pos[`${src}_${si}`]
        const t = pos[`${tgt}_${(si+1)}`]
        if (!s || !t) return
        const my = (s.y + NH / 2 + t.y - NH / 2) / 2
        rootG.append('path')
          .attr('class', 'edge')
          .attr('d', `M${s.x},${s.y+NH/2} C${s.x},${my} ${t.x},${my} ${t.x},${t.y-NH/2}`)
          .attr('stroke', pColor + '70')
          .attr('marker-end', 'url(#arr-hi)')
          .attr('stroke-dasharray', nxt.parallel ? '5 4' : null)
      })
    })

    // Step label
    const midSrcX = d3.mean(step.agents.map(s => pos[`${s}_${si}`].x))
    const y1      = pos[`${step.agents[0]}_${si}`].y + NH / 2
    const y2      = pos[`${nxt.agents[0]}_${si+1}`].y - NH / 2
    rootG.append('text').attr('class', 'edge-label')
      .attr('x', midSrcX).attr('y', (y1 + y2) / 2)
      .attr('dy', 4).text(nxt.label)
  })

  // ── Nodes ─────────────────────────────────────────────────────────────────
  steps.forEach((step, si) => {
    step.agents.forEach(slug => {
      const p    = pos[`${slug}_${si}`]
      const info = nodeInfo(slug)
      drawNode(rootG, p.x, p.y, info, pColor)
    })
  })

  // ── Input / Output badges ─────────────────────────────────────────────────
  const firstStep = steps[0]
  const lastStep  = steps[steps.length - 1]
  const fp = pos[`${firstStep.agents[0]}_0`]
  const lp = pos[`${lastStep.agents[0]}_${steps.length - 1}`]
  const midX = W / 2

  // Start badge
  badge(rootG, midX, fp.y - NH / 2 - 44, 'USER INPUT', pColor, pColor + '25')
  rootG.append('line')
    .attr('x1', midX).attr('y1', fp.y - NH / 2 - 20)
    .attr('x2', midX).attr('y2', fp.y - NH / 2 - 2)
    .attr('stroke', pColor + '80').attr('stroke-width', 1.5)
    .attr('marker-end', 'url(#arr-hi)')

  // End badge
  badge(rootG, midX, lp.y + NH / 2 + 20, '→ SLACK', '#10b981', '#10b98120')
  rootG.append('line')
    .attr('x1', midX).attr('y1', lp.y + NH / 2 + 2)
    .attr('x2', midX).attr('y2', lp.y + NH / 2 + 18)
    .attr('stroke', '#10b98180').attr('stroke-width', 1.5)
    .attr('marker-end', 'url(#arr-green)')

  fitView()
}

// ─── Full map (force-directed) ────────────────────────────────────────────────
function drawMap() {
  if (!rootG) return
  rootG.selectAll('*').remove()

  const W = svgEl.clientWidth, H = svgEl.clientHeight

  // Collect all slugs in pipelines → "core" agents
  const coreSet = new Set(G.pipelines.flatMap(p => p.steps.flatMap(s => s.agents)))

  const nodes = G.nodes.map(n => ({ ...n }))
  const edges = G.edges.map(e => ({ ...e }))

  // Investment pipeline cluster (center-right)
  const CX = W * 0.58, CY = H * 0.5
  // IT pipeline cluster (left)
  const ITX = W * 0.18, ITY = H * 0.5

  const fixed = {
    // ── Investment agents ──
    'orchestrator':          { x: CX,         y: CY - H*0.32 },
    'market-bias-analyst':   { x: CX,         y: CY - H*0.18 },
    'industry-analyst':      { x: CX - 170,   y: CY },
    'price-analyst':         { x: CX,         y: CY },
    'etf-manager':           { x: CX + 170,   y: CY },
    'idea-generator':        { x: CX - 85,    y: CY + H*0.16 },
    'leveraged-etf-analyst': { x: CX + 100,   y: CY + H*0.16 },
    'thematic-etf-analyst':  { x: CX + 280,   y: CY + H*0.16 },
    'etf-launch-monitor':    { x: CX + 190,   y: CY + H*0.30 },
    'reporter':              { x: CX - 85,    y: CY + H*0.30 },
    // ── IT agents ──
    'it-orchestrator':       { x: ITX,        y: ITY - H*0.32 },
    'tech-explorer':         { x: ITX - 80,   y: ITY - H*0.16 },
    'tech-researcher':       { x: ITX + 80,   y: ITY - H*0.16 },
    'service-designer':      { x: ITX,        y: ITY },
    'service-builder':       { x: ITX,        y: ITY + H*0.16 },
    'qa-engineer':           { x: ITX - 90,   y: ITY + H*0.30 },
    'security-dev':          { x: ITX + 90,   y: ITY + H*0.30 },
  }
  nodes.forEach(n => { if (fixed[n.slug]) { n.fx = fixed[n.slug].x; n.fy = fixed[n.slug].y } })

  const sim = d3.forceSimulation(nodes)
    .force('link',    d3.forceLink(edges).id(d => d.slug).distance(120).strength(0.2))
    .force('charge',  d3.forceManyBody().strength(-200))
    .force('center',  d3.forceCenter(W / 2, H / 2).strength(0.02))
    .force('collide', d3.forceCollide(65))

  // Cluster group labels
  const grpG = rootG.append('g')
  function clusterLabel(x, y, label, color) {
    grpG.append('text')
      .attr('x', x).attr('y', y)
      .attr('text-anchor', 'middle')
      .attr('font-size', 10).attr('font-weight', 700)
      .attr('fill', color + '60').attr('letter-spacing', '1px')
      .text(label)
  }
  clusterLabel(ITX, ITY - H*0.38, 'IT PIPELINE', '#f97316')
  clusterLabel(CX,  CY - H*0.38, 'INVESTMENT PIPELINE', '#6c63ff')

  // Edges — drawn as paths so marker-end sits correctly at rect border
  const linkG = rootG.append('g')

  // Nodes
  const nodeG = rootG.append('g').selectAll('g')
    .data(nodes).join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y })
      .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y })
      .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); if (!fixed[d.slug]) { d.fx = null; d.fy = null } })
    )
    .on('mouseover', (evt, d) => showTip(evt, d))
    .on('mousemove', moveTip)
    .on('mouseout',  hideTip)
    .on('click', (_, d) => window.open(`/?agent=${d.slug}`, '_blank'))

  nodeG.each(function(d) {
    const el    = d3.select(this)
    const color = TYPE_COLOR[d.type] || '#4b5563'
    const isCore = coreSet.has(d.slug)

    el.append('rect')
      .attr('x', -NW/2).attr('y', -NH/2).attr('width', NW).attr('height', NH)
      .attr('rx', 9)
      .attr('fill', isCore ? color + '18' : '#16192a')
      .attr('stroke', color)
      .attr('stroke-width', isCore ? 2 : 1)
      .attr('opacity', isCore ? 1 : 0.5)

    el.append('text')
      .attr('y', d.model ? -6 : 0)
      .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
      .attr('font-size', 11).attr('font-weight', 600).attr('fill', '#d0d4ec')
      .text(truncate(d.name, 19))

    if (d.model) {
      el.append('text')
        .attr('y', 9).attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
        .attr('font-size', 8.5).attr('fill', color + '99')
        .text(d.model)
    }
  })

  // Helper: find where line from (sx,sy) to (tx,ty) intersects rect border at (tx,ty)
  function rectEdgePt(sx, sy, tx, ty) {
    const dx = tx - sx, dy = ty - sy
    if (Math.abs(dx) < 0.01 && Math.abs(dy) < 0.01) return {x: tx, y: ty}
    const hw = NW / 2 + 2, hh = NH / 2 + 2  // half-dims + small padding
    let t
    if (Math.abs(dx) * hh > Math.abs(dy) * hw) {
      t = hw / Math.abs(dx)
    } else {
      t = hh / Math.abs(dy)
    }
    return { x: tx - dx * t, y: ty - dy * t }
  }

  sim.on('tick', () => {
    // Rebuild edge paths each tick
    linkG.selectAll('*').remove()
    edges.forEach(e => {
      if (!e.source.x) return
      const ep = rectEdgePt(e.source.x, e.source.y, e.target.x, e.target.y)
      const sp = rectEdgePt(e.target.x, e.target.y, e.source.x, e.source.y)
      linkG.append('line')
        .attr('x1', sp.x).attr('y1', sp.y)
        .attr('x2', ep.x).attr('y2', ep.y)
        .attr('stroke', '#2e3454').attr('stroke-width', 1.5)
        .attr('marker-end', 'url(#arr)')
    })
    nodeG.attr('transform', d => `translate(${d.x},${d.y})`)
  })

  svgD3.call(zoomBeh.transform, d3.zoomIdentity.translate(W*0.02, H*0.04).scale(0.82))
}

// ─── Draw helpers ─────────────────────────────────────────────────────────────
function drawNode(parent, cx, cy, info, activeColor) {
  const color = TYPE_COLOR[info.type] || '#4b5563'
  const stroke = activeColor || color

  const g = parent.append('g')
    .attr('class', 'node')
    .attr('transform', `translate(${cx},${cy})`)
    .on('mouseover', (evt) => showTip(evt, info))
    .on('mousemove', moveTip)
    .on('mouseout',  hideTip)
    .on('click', () => window.open(`/?agent=${info.slug}`, '_blank'))

  g.append('rect')
    .attr('x', -NW/2).attr('y', -NH/2).attr('width', NW).attr('height', NH)
    .attr('rx', 9)
    .attr('fill', color + '18')
    .attr('stroke', stroke)
    .attr('stroke-width', 2)

  g.append('text')
    .attr('y', info.model ? -6 : 0)
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
    .attr('font-size', 11).attr('font-weight', 700).attr('fill', '#dce0f5')
    .text(truncate(info.name, 19))

  if (info.model) {
    g.append('text')
      .attr('y', 9).attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
      .attr('font-size', 8.5).attr('fill', stroke + '99')
      .text(info.model)
  }
}

function badge(parent, x, y, label, color, bg) {
  const w = label.length * 7 + 20
  parent.append('rect')
    .attr('x', x - w/2).attr('y', y - 11)
    .attr('width', w).attr('height', 22).attr('rx', 11)
    .attr('fill', bg).attr('stroke', color + '80').attr('stroke-width', 1)
  parent.append('text')
    .attr('x', x).attr('y', y + 1)
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
    .attr('font-size', 10).attr('font-weight', 700)
    .attr('fill', color).text(label)
}

function nodeInfo(slug) {
  return G.nodes.find(n => n.slug === slug) ||
    { slug, name: slug, type: 'other', model: '', description: '', inputs: [], outputs: [], calls: [] }
}

// ─── Tooltip ──────────────────────────────────────────────────────────────────
const tipEl = document.getElementById('tip')

function showTip(evt, d) {
  const color = TYPE_COLOR[d.type] || '#4b5563'
  const inputs  = (d.inputs  || []).map(f => `<div class="tip-contract-item">${esc(f)}</div>`).join('')
  const outputs = (d.outputs || []).map(f => `<div class="tip-contract-item">${esc(f)}</div>`).join('')
  const calls   = (d.calls   || []).map(s => `<div class="tip-contract-item">${esc(s)}</div>`).join('')

  tipEl.innerHTML = `
    <div class="tip-name">${esc(d.name)}</div>
    <div class="tip-type" style="color:${color}">${d.type}</div>
    <div class="tip-desc">${esc(d.description || '설명 없음')}</div>
    ${d.model ? `<span class="tip-model">${esc(d.model)}</span>` : ''}
    ${calls   ? `<div class="tip-contract"><div class="tip-contract-label">▶ calls</div>${calls}</div>` : ''}
    ${inputs  ? `<div class="tip-contract"><div class="tip-contract-label">↓ inputs</div>${inputs}</div>` : ''}
    ${outputs ? `<div class="tip-contract"><div class="tip-contract-label">↑ outputs</div>${outputs}</div>` : ''}
    <div class="tip-hint">클릭 → 에이전트 편집기</div>
  `
  tipEl.classList.add('show')
  moveTip(evt)
}

function moveTip(evt) {
  tipEl.style.left = Math.min(evt.clientX + 14, window.innerWidth  - 290) + 'px'
  tipEl.style.top  = Math.min(evt.clientY - 10, window.innerHeight - 260) + 'px'
}

function hideTip() { tipEl.classList.remove('show') }

// ─── Zoom controls ────────────────────────────────────────────────────────────
function zoomIn()    { svgD3.transition().duration(300).call(zoomBeh.scaleBy, 1.3) }
function zoomOut()   { svgD3.transition().duration(300).call(zoomBeh.scaleBy, 0.77) }
function resetView() { svgD3.transition().duration(400).call(zoomBeh.transform, d3.zoomIdentity) }
function fitView()   {
  const bbox = rootG.node()?.getBBox()
  if (!bbox || !bbox.width) return
  const W = svgEl.clientWidth, H = svgEl.clientHeight
  const scale = Math.min(0.95, Math.min(W / (bbox.width + 80), H / (bbox.height + 100)))
  const tx    = (W - bbox.width  * scale) / 2 - bbox.x * scale
  const ty    = (H - bbox.height * scale) / 2 - bbox.y * scale
  svgD3.transition().duration(400).call(zoomBeh.transform, d3.zoomIdentity.translate(tx, ty).scale(scale))
}

// ─── Utils ───────────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function truncate(s, n) { return s.length > n ? s.slice(0, n - 1) + '…' : s }

// ─── Start ───────────────────────────────────────────────────────────────────
init()
</script>
